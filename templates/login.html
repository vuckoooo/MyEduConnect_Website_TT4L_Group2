{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 2rem auto;">
    <h2 class="text-center">{{ action }} to MyEduConnect</h2>
    <p class="text-center mb-2">
        {% if action == 'Login' %}
            Don't have an account? <a href="{{ url_for('frontend_bp.register') }}" style="color: var(--accent);">Register</a>
        {% else %}
            Already have an account? <a href="{{ url_for('frontend_bp.login') }}" style="color: var(--accent);">Login</a>
        {% endif %}
    </p>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; padding: 0.8rem; font-size: 1.1rem;">{{ action }}</button>
    </form>
</div>
{% endblock %}
