<VirtualHost *:80>
    ServerName myeduconnect.local
    DocumentRoot /var/www/html/MyEduConnect

    # REMEDIATION: Disable Open Directory Listing globally
    <Directory /var/www/html/MyEduConnect>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # REMEDIATION: Secure the admin portal
    # Best practice is to handle admin logic within Flask using role-based access control,
    # but if static files must be served, protect them at the webserver level.
    <Directory /var/www/html/MyEduConnect/admin-portal>
        Options -Indexes
        AuthType Basic
        AuthName "Restricted Admin Portal"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user
    </Directory>

    # Proxy traffic to Flask App
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/
</VirtualHost>
